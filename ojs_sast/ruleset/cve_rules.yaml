rules:

  # ===== REFLECTED CROSS-SITE SCRIPTING ===================================

  - id: CVE-SRC-12229

    name: "Reflected XSS in Search Page authors Field (CVE-2018-12229)"

    module: source_code

    cwe: CWE-79

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 6.1

    cve_references: ["CVE-2018-12229"]

    description: >-

      The frontend search page renders the authors search parameter directly
      into an HTML input value attribute without escaping. Because the authors
      value comes from a URL or GET parameter, an unauthenticated attacker may
      craft a malicious search URL that breaks out of the value attribute and
      injects HTML or JavaScript into the victim's browser.

    remediation: >-

      Escape the authors variable before rendering it inside the HTML attribute.
      In Smarty templates, append the |escape modifier when outputting dynamic
      values inside attributes. The safe pattern is value="{$authors|escape}".
      Review other search form fields and ensure all URL-derived values rendered
      into HTML attributes are escaped.

    params:

      cve_id: CVE-2018-12229

      vulnerability_type: reflected_xss

      affected_versions: [">=3.0.0", "<=3.1.1-1"]

      patched_versions: ["3.1.1-2"]

      file_path_patterns:

        - "templates/frontend/pages/search\\.tpl$"

        - "templates/search/search\\.tpl$"

        - "templates/search/advancedSearch\\.tpl$"

      class_name: "*"

      function_name: "Smarty Template Variable Interpolation"

      source_patterns:

        - "name=\"authors\""

        - "value=\"\\{\\$authors"

        - "\\$authors"

      sink_patterns:

        - "<input[^>]+name=\"authors\"[^>]+value=\"\\{\\$authors\\}\""

        - "<input[^>]+value=\"\\{\\$authors\\}\"[^>]+name=\"authors\""

        - "value=\"\\{\\$authors\\}\""

        - "\\{\\$authors\\}(?!\\|escape)"

      safe_patch_patterns:

        - "value=\"\\{\\$authors\\|escape\\}\""

        - "\\{\\$authors\\|escape\\}"

        - "\\|escape"

        - "htmlspecialchars"

        - "htmlentities"

      confidence_reason: >-

        The search.tpl template renders the URL-controlled authors value inside
        an HTML input value attribute without the Smarty |escape modifier. The
        patched implementation changes value="{$authors}" to
        value="{$authors|escape}".
        
  # ===== INSECURE DESERIALIZATION / PHP OBJECT INJECTION ==================

  - id: CVE-SRC-19909

    name: "Deserialization of Untrusted Data in Report Generator (CVE-2019-19909)"

    module: source_code

    cwe: CWE-502

    owasp: "A08:2021"

    severity: HIGH

    pattern_type: cve

    cvss_score: 8.8

    cve_references: ["CVE-2019-19909"]

    description: >-

      The report generator reads filters and orderBy values from URL parameters
      using $request->getUserVar() and passes them to unserialize(). Because
      these values can be attacker-controlled, PHP may instantiate arbitrary
      serialized objects and invoke magic methods such as __wakeup() or
      __destruct(). In vulnerable deployments, this may lead to PHP object
      injection and code execution.

    remediation: >-

      Do not call unserialize() on request-controlled data. Replace serialized
      URL parameters with JSON encoding and decoding, using json_encode() when
      generating report URLs and json_decode() when reading filters or orderBy
      values. If unserialize() is unavoidable for trusted legacy data, use
      allowed_classes => false and ensure the input cannot be modified by end
      users.

    params:

      cve_id: CVE-2019-19909

      vulnerability_type: insecure_deserialization

      affected_versions: ["<3.1.2-2"]

      patched_versions: ["3.1.2-2"]

      file_path_patterns:

        - "pages/management/PKPToolsHandler\\.inc\\.php$"

        - "pages/manager/PKPToolsHandler\\.inc\\.php$"

        - "classes/statistics/PKPStatisticsHelper\\.inc\\.php$"

      class_name: "*"

      function_name: "*"

      source_patterns:

        - "\\$request->getUserVar\\s*\\(\\s*['\"]filters['\"]\\s*\\)"

        - "\\$request->getUserVar\\s*\\(\\s*['\"]orderBy['\"]\\s*\\)"

        - "filters"

        - "orderBy"

        - "serialize\\s*\\("

        - "unserialize\\s*\\("

      sink_patterns:

        - "\\$filters\\s*=\\s*unserialize\\s*\\(\\s*\\$request->getUserVar\\s*\\(\\s*['\"]filters['\"]\\s*\\)\\s*\\)"

        - "\\$orderBy\\s*=\\s*unserialize\\s*\\(\\s*\\$orderBy\\s*\\)"

        - "unserialize\\s*\\(\\s*\\$request->getUserVar\\s*\\("

        - "['\"]filters['\"]\\s*=>\\s*serialize\\s*\\(\\s*\\$filter\\s*\\)"

        - "\\$args\\s*\\[\\s*['\"]orderBy['\"]\\s*\\]\\s*=\\s*serialize\\s*\\(\\s*\\$orderBy\\s*\\)"

      safe_patch_patterns:

        - "json_decode\\s*\\(\\s*\\$request->getUserVar\\s*\\(\\s*['\"]filters['\"]\\s*\\)\\s*\\)"

        - "json_decode\\s*\\(\\s*\\$orderBy\\s*\\)"

        - "json_encode\\s*\\(\\s*\\$filter\\s*\\)"

        - "json_encode\\s*\\(\\s*\\$orderBy\\s*\\)"

        - "allowed_classes\\s*=>\\s*false"

        - "unserialize\\s*\\([^,]+,\\s*\\[\\s*['\"]allowed_classes['\"]\\s*=>\\s*false\\s*\\]"

      confidence_reason: >-

        The affected report generation flow reads filters or orderBy from
        request parameters and passes the value into unserialize(). The companion
        URL generation logic serializes filter and orderBy values into URL
        arguments. The patched implementation replaces serialize/unserialize
        with json_encode/json_decode.

  # ===== HOST HEADER INJECTION / REFLECTED XSS ============================

  - id: CVE-SRC-26616

    name: "Reflected XSS via Host Header Injection in getServerHost (CVE-2022-26616)"

    module: source_code

    cwe: CWE-79

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 6.1

    cve_references: ["CVE-2022-26616"]

    description: >-

      PKPRequest::getServerHost() resolves the server host from untrusted HTTP
      headers such as HTTP_X_FORWARDED_HOST, HTTP_HOST, or SERVER_NAME. In
      vulnerable versions, the selected host value is assigned directly to
      $this->_serverHost and later used to build absolute URLs. An unauthenticated
      attacker can manipulate the Host or X-Forwarded-Host header, causing
      attacker-controlled host content to be reflected into generated URLs,
      pages, or emails. This may lead to reflected XSS or sensitive token
      leakage through attacker-controlled links.

    remediation: >-

      Validate host header values against an explicit allowlist before assigning
      them as the canonical server host. Use a configuration value such as
      Config::getVar('general', 'allowed_hosts'), decode it into an allowed host
      array, normalize values to lowercase, and only accept the supplied host
      when it matches the allowlist. Otherwise fall back to a trusted default
      host. Do not use HTTP_HOST or HTTP_X_FORWARDED_HOST directly in URL
      generation.

    params:

      cve_id: CVE-2022-26616

      vulnerability_type: host_header_injection_reflected_xss

      affected_versions: ["<=3.2.1-3", "<=3.3.0-8", "2.x"]

      patched_versions: ["3.2.1-4", "3.3.0-9"]

      file_path_patterns:

        - "classes/core/PKPRequest\\.inc\\.php$"

      class_name: PKPRequest

      function_name: getServerHost

      source_patterns:

        - "\\$_SERVER\\s*\\[\\s*['\"]HTTP_X_FORWARDED_HOST['\"]\\s*\\]"

        - "\\$_SERVER\\s*\\[\\s*['\"]HTTP_HOST['\"]\\s*\\]"

        - "\\$_SERVER\\s*\\[\\s*['\"]SERVER_NAME['\"]\\s*\\]"

        - "\\$this->_serverHost"

        - "strtok\\s*\\("

      sink_patterns:

        - "\\$this->_serverHost\\s*=\\s*isset\\s*\\(\\s*\\$_SERVER\\s*\\[\\s*['\"]HTTP_X_FORWARDED_HOST['\"]\\s*\\]"

        - "\\$this->_serverHost\\s*=.*\\$_SERVER\\s*\\[\\s*['\"]HTTP_X_FORWARDED_HOST['\"]\\s*\\]"

        - "\\$this->_serverHost\\s*=.*\\$_SERVER\\s*\\[\\s*['\"]HTTP_HOST['\"]\\s*\\]"

        - "\\$this->_serverHost\\s*=.*\\$_SERVER\\s*\\[\\s*['\"]SERVER_NAME['\"]\\s*\\]"

        - "\\$this->_serverHost\\s*=\\s*strtok\\s*\\(\\s*\\$this->_serverHost\\s*,\\s*['\"],['\"]\\s*\\)"

      safe_patch_patterns:

        - "Config::getVar\\s*\\(\\s*['\"]general['\"]\\s*,\\s*['\"]allowed_hosts['\"]\\s*\\)"

        - "\\$allowedHosts"

        - "json_decode\\s*\\(\\s*\\$allowedHosts\\s*\\)"

        - "array_map\\s*\\(\\s*['\"]strtolower['\"]\\s*,\\s*json_decode\\s*\\("

        - "in_array\\s*\\(\\s*strtolower\\s*\\(\\s*\\$serverHost\\s*\\)\\s*,\\s*\\$allowedHosts\\s*\\)"

        - "\\$this->_serverHost\\s*=\\s*\\$default"

      confidence_reason: >-

        The getServerHost() implementation reads host values from HTTP headers
        and assigns them to $this->_serverHost. A vulnerable implementation lacks
        an allowed_hosts configuration lookup and in_array() allowlist check
        before accepting the untrusted host value. The fixed implementation
        validates the normalized host against Config::getVar('general',
        'allowed_hosts') and falls back to the trusted default when validation
        fails.

  # ===== CROSS-SITE REQUEST FORGERY =======================================

  - id: CVE-SRC-5626

    name: "CSRF in Payment Types Form Missing FormValidatorCSRF (CVE-2023-5626)"

    module: source_code

    cwe: CWE-352

    owasp: "A01:2021"

    severity: HIGH

    pattern_type: cve

    cvss_score: 8.8

    cve_references: ["CVE-2023-5626"]

    description: >-

      The PaymentTypesForm constructor defines validators for payment-related
      fields but does not add a CSRF validator. Because the form performs
      state-changing payment configuration updates, a privileged user's browser
      may be tricked into submitting a forged request that alters subscription
      or payment settings.

    remediation: >-

      Add a CSRF validator to the form constructor using
      $this->addCheck(new FormValidatorCSRF($this));. Ensure all forms that
      modify payment, subscription, configuration, user, or site settings
      include equivalent CSRF protection before processing submissions.

    params:

      cve_id: CVE-2023-5626

      vulnerability_type: csrf

      affected_versions: ["<3.3.0-16"]

      patched_versions: ["3.3.0-16"]

      file_path_patterns:

        - "classes/subscription/form/PaymentTypesForm\\.inc\\.php$"

      class_name: PaymentTypesForm

      function_name: "__construct"

      source_patterns:

        - "public\\s+function\\s+__construct\\s*\\("

        - "FormValidatorCustom"

        - "membershipFee"

        - "manager\\.payment\\.form\\.numeric"

        - "addCheck\\s*\\("

      sink_patterns:

        - "\\$this->addCheck\\s*\\(\\s*new\\s+FormValidatorCustom\\s*\\("

        - "membershipFee"

        - "is_numeric\\s*\\("

        - "\\$membershipFee\\s*>=\\s*0"

      safe_patch_patterns:

        - "FormValidatorCSRF"

        - "\\$this->addCheck\\s*\\(\\s*new\\s+FormValidatorCSRF\\s*\\(\\s*\\$this\\s*\\)\\s*\\)"

      confidence_reason: >-

        The PaymentTypesForm constructor contains form validation logic for
        state-changing payment configuration fields but lacks
        $this->addCheck(new FormValidatorCSRF($this)). The patched version adds
        FormValidatorCSRF to protect payment type updates from forged requests.

  # ===== STORED CROSS-SITE SCRIPTING ======================================

  - id: CVE-SRC-5894

    name: "Stored XSS in Issue Title Edit Modal (CVE-2023-5894)"

    module: source_code

    cwe: CWE-79

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 5.4

    cve_references: ["CVE-2023-5894"]

    description: >-

      The issue title returned by $issue->getIssueIdentification() is passed
      directly into the __() translation helper as the issueIdentification
      parameter without HTML escaping. Because issue titles can be configured by
      users with editor privileges, malicious HTML or JavaScript may be stored
      and later rendered in the Edit Issue Ajax modal, resulting in stored
      cross-site scripting.

    remediation: >-

      Escape issue titles before passing them into translation parameters that
      may be rendered in HTML contexts. Wrap $issue->getIssueIdentification()
      with htmlspecialchars() or an equivalent escaping function before passing
      it to the __() helper. Ensure all translated modal titles, labels, and
      messages that include user-controlled values are escaped before rendering.

    params:

      cve_id: CVE-2023-5894

      vulnerability_type: stored_xss

      affected_versions: ["<3.3.0-16", ">=3.4.0", "<3.4.0-4"]

      patched_versions: ["3.3.0-16", "3.4.0-4"]

      file_path_patterns:

        - "controllers/grid/issues/IssueGridCellProvider\\.inc\\.php$"

        - "controllers/grid/issues/IssueGridCellProvider\\.php$"

        - "controllers/grid/issues/IssueGridRow\\.inc\\.php$"

        - "controllers/grid/issues/IssueGridRow\\.php$"

      class_name: "*"

      function_name: "*"

      source_patterns:

        - "__\\s*\\("

        - "editor\\.issues\\.editIssue"

        - "issueIdentification"

        - "\\$issue->getIssueIdentification\\s*\\("

      sink_patterns:

        - "__\\s*\\(\\s*['\"]editor\\.issues\\.editIssue['\"]\\s*,\\s*array\\s*\\(\\s*['\"]issueIdentification['\"]\\s*=>\\s*\\$issue->getIssueIdentification\\s*\\(\\s*\\)\\s*\\)"

        - "__\\s*\\(\\s*['\"]editor\\.issues\\.editIssue['\"]\\s*,\\s*\\[\\s*['\"]issueIdentification['\"]\\s*=>\\s*\\$issue->getIssueIdentification\\s*\\(\\s*\\)\\s*\\]"

        - "['\"]issueIdentification['\"]\\s*=>\\s*\\$issue->getIssueIdentification\\s*\\(\\s*\\)"

      safe_patch_patterns:

        - "htmlspecialchars\\s*\\(\\s*\\$issue->getIssueIdentification\\s*\\(\\s*\\)\\s*\\)"

        - "htmlentities\\s*\\(\\s*\\$issue->getIssueIdentification\\s*\\(\\s*\\)\\s*\\)"

        - "htmlspecialchars\\s*\\("

        - "htmlentities\\s*\\("

        - "strip_unsafe_html\\s*\\("

        - "escape"

      confidence_reason: >-

        The affected issue grid files build Edit Issue modal text using the
        __() translation helper. A vulnerable implementation passes
        $issue->getIssueIdentification() directly as the issueIdentification
        translation parameter without htmlspecialchars() or equivalent escaping.
        The patched implementation wraps the getter result with htmlspecialchars().

  # ===== STORED CROSS-SITE SCRIPTING ======================================

  - id: CVE-SRC-5903

    name: "Stored XSS in Section Title Rendering on Submissions Page (CVE-2023-5903)"

    module: source_code

    cwe: CWE-79

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 5.4

    cve_references: ["CVE-2023-5903"]

    description: >-

      The submissions page passes the localized section title into a Smarty
      {translate} parameter without escaping. The value returned by
      $section->getLocalizedTitle() may be controlled by a privileged user who
      can create or edit journal sections. When rendered on the frontend
      submissions page, malicious HTML or JavaScript in the section title may
      execute in a victim's browser, resulting in stored cross-site scripting.

    remediation: >-

      Escape section titles before passing them into Smarty translation output.
      Apply the |escape modifier to $section->getLocalizedTitle() in the
      {translate} call. The safe pattern is:
      name=$section->getLocalizedTitle()|escape. Also ensure other localized
      title or string getters rendered in templates are escaped unless they are
      intentionally sanitized rich text.

    params:

      cve_id: CVE-2023-5903

      vulnerability_type: stored_xss

      affected_versions: ["<3.3.0-16"]

      patched_versions: ["3.3.0-16"]

      file_path_patterns:

        - "templates/frontend/pages/submissions\\.tpl$"

      class_name: "*"

      function_name: "Smarty Template Translation Rendering"

      source_patterns:

        - "\\{translate"

        - "about\\.onlineSubmissions\\.submitToSection"

        - "name=\\$section->getLocalizedTitle\\s*\\("

        - "url=\\$sectionSubmissionUrl"

      sink_patterns:

        - "\\{translate\\s+key=['\"]about\\.onlineSubmissions\\.submitToSection['\"][^}]*name=\\$section->getLocalizedTitle\\s*\\(\\s*\\)(?!\\|escape)(?!\\|strip_unsafe_html)[^}]*\\}"

        - "name=\\$section->getLocalizedTitle\\s*\\(\\s*\\)\\s+url=\\$sectionSubmissionUrl"

        - "name=\\$section->getLocalizedTitle\\s*\\(\\s*\\)(?!\\|escape)"

      safe_patch_patterns:

        - "name=\\$section->getLocalizedTitle\\s*\\(\\s*\\)\\|escape"

        - "name=\\$section->getLocalizedTitle\\s*\\(\\s*\\)\\|strip_unsafe_html"

        - "\\|escape"

        - "\\|strip_unsafe_html"

      confidence_reason: >-

        The submissions.tpl template renders the section title returned by
        $section->getLocalizedTitle() inside a Smarty {translate} call without
        the |escape modifier. The patched implementation appends |escape to the
        localized section title before rendering it into the frontend DOM.

  # ===== PATH TRAVERSAL / ARBITRARY FILE WRITE / RCE ======================

  - id: CVE-SRC-47271

    name: "RCE via Path Traversal in NativeImportExportPlugin cover_image (CVE-2023-47271)"

    module: source_code

    cwe: CWE-22

    owasp: "A01:2021"

    severity: CRITICAL

    pattern_type: cve

    cvss_score: 9.1

    cve_references: ["CVE-2023-47271"]

    description: >-

      The Native XML import/export plugin reads the XML cover_image value from
      DOMElement textContent and uses it as a server-side uploadName. The value
      is later concatenated into a context file path and written with
      file_put_contents() using decoded embed content. If the cover_image value
      is not strictly sanitized, an authenticated user with access to the Native
      XML import/export plugin may perform path traversal and write or overwrite
      arbitrary files. In vulnerable deployments, this can lead to remote code
      execution.

    remediation: >-

      Do not use XML-provided cover_image values directly as file names. Normalize
      and strictly allowlist the filename before assigning it to uploadName.
      Apply strtolower(), replace unsafe separators with safe characters,
      remove all characters outside /[^a-z0-9\.\-]+/, wrap the result in
      basename(), and prefix it with uniqid(). Also validate allowed extensions
      and ensure the final resolved path remains inside the intended public file
      directory before writing.

    params:

      cve_id: CVE-2023-47271

      vulnerability_type: path_traversal_arbitrary_file_write_rce

      affected_versions: ["<=3.3.0-15", "<=3.4.0-3"]

      patched_versions: ["3.3.0-16", "3.4.0-4"]

      file_path_patterns:

        - "plugins/importexport/native/filter/PKPNativeFilterHelper\\.php$"

        - "plugins/importexport/native/filter/NativeXmlPublicationFilter\\.inc\\.php$"

        - "plugins/importexport/native/filter/NativeXmlPublicationFilter\\.php$"

      class_name: "*"

      function_name: parsePublicationCover

      source_patterns:

        - "case\\s+['\"]cover_image['\"]\\s*:"

        - "\\$n->textContent"

        - "\\$coverImage\\s*\\[\\s*['\"]uploadName['\"]\\s*\\]"

        - "case\\s+['\"]embed['\"]\\s*:"

      sink_patterns:

        - "\\$coverImage\\s*\\[\\s*['\"]uploadName['\"]\\s*\\]\\s*=\\s*\\$n->textContent"

        - "\\$coverImage\\s*\\[\\s*['\"]uploadName['\"]\\s*\\]\\s*=\\s*uniqid\\s*\\(\\s*\\)\\s*\\.\\s*['\"]-['\"]\\s*\\.\\s*basename\\s*\\(\\s*\\$n->textContent\\s*\\)"

        - "\\$filePath\\s*=\\s*\\$publicFileManager->getContextFilesPath\\s*\\([^)]*\\)\\s*\\.\\s*['\"]\\/['\"]\\s*\\.\\s*\\$coverImage\\s*\\[\\s*['\"]uploadName['\"]\\s*\\]"

        - "file_put_contents\\s*\\(\\s*\\$filePath\\s*,\\s*base64_decode\\s*\\(\\s*\\$n->textContent\\s*\\)"

      safe_patch_patterns:

        - "uniqid\\s*\\(\\s*\\)\\s*\\.\\s*['\"]-['\"]\\s*\\.\\s*basename\\s*\\(\\s*preg_replace\\s*\\("

        - "preg_replace\\s*\\("

        - "\\/\\[\\^a-z0-9\\\\\\.\\\\\\-\\]\\+\\/"

        - "str_replace\\s*\\("

        - "strtolower\\s*\\(\\s*\\$n->textContent\\s*\\)"

        - "basename\\s*\\("

        - "realpath\\s*\\("

      confidence_reason: >-

        The parsePublicationCover() flow handles the cover_image XML element,
        assigns $n->textContent or an insufficiently sanitized basename() value
        to $coverImage['uploadName'], builds $filePath from that uploadName, and
        writes decoded embed data with file_put_contents(). A safe
        implementation applies strict allowlist filtering with preg_replace(),
        str_replace(), strtolower(), basename(), and a uniqid() prefix before
        the value can influence the final write path.

  # ===== STORED CROSS-SITE SCRIPTING ======================================

  - id: CVE-SRC-13469

    name: "Stored XSS in Manual Payment Instructions (CVE-2025-13469)"

    module: source_code

    cwe: CWE-79

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 4.8

    cve_references: ["CVE-2025-13469"]

    description: >-

      The Manual Payment Plugin renders the manualInstructions setting directly
      into the payment checkout page using only the Smarty nl2br modifier.
      The nl2br modifier preserves line breaks but does not neutralize unsafe
      HTML or JavaScript. A high-privilege user who can configure manual payment
      instructions may store malicious markup that later executes in a victim's
      browser during checkout.

    remediation: >-

      Sanitize manualInstructions before rendering it in the Smarty template.
      Apply the strip_unsafe_html modifier before nl2br, or use an equivalent
      HTML escaping or sanitization mechanism. The fixed rendering pattern is
      {$manualInstructions|strip_unsafe_html|nl2br}. Also ensure rich text
      settings are sanitized server-side before being persisted.

    params:

      cve_id: CVE-2025-13469

      vulnerability_type: stored_xss

      affected_versions: ["3.3.0", "3.4.0", "3.5.0"]

      patched_versions: []

      file_path_patterns:

        - "plugins/paymethod/manual/templates/paymentForm\\.tpl$"

      class_name: "*"

      function_name: "Smarty Template Translation Rendering"

      source_patterns:

        - "manualInstructions"

        - "\\{\\$manualInstructions"

        - "\\|nl2br"

      sink_patterns:

        - "<p>\\s*\\{\\$manualInstructions\\|nl2br\\}\\s*</p>"

        - "\\{\\$manualInstructions\\|nl2br\\}"

        - "\\{\\$manualInstructions(?![^}]*strip_unsafe_html)(?![^}]*escape)[^}]*\\}"

      safe_patch_patterns:

        - "\\{\\$manualInstructions\\|strip_unsafe_html\\|nl2br\\}"

        - "\\|strip_unsafe_html"

        - "\\|escape"

        - "\\|htmlspecialchars"

      confidence_reason: >-

        The paymentForm.tpl template renders the manualInstructions variable
        into the HTML body using only the nl2br modifier. A vulnerable template
        lacks strip_unsafe_html, escape, or equivalent sanitization before the
        value is inserted into the page.

  # ===== SQL INJECTION =====================================================

  - id: CVE-SRC-67889

    name: "SQL Injection in Institution Collector searchPhrase (CVE-2025-67889)"

    module: source_code

    cwe: CWE-89

    owasp: "A03:2021"

    severity: HIGH

    pattern_type: cve

    cvss_score: 8.1

    cve_references: ["CVE-2025-67889"]

    description: >-

      The Institution Collector searchPhrase parameter is split into words and
      each word is interpolated into DB::raw() using double-quoted PHP string
      interpolation. The code uses addcslashes($word, '%_'), but this only
      escapes SQL LIKE wildcard characters and does not safely quote SQL string
      literals. Because the interpolated value is passed to DB::raw() instead
      of a prepared statement or PDO quoting, an authenticated user with access
      to the Institutions API may perform SQL injection.

    remediation: >-

      Do not interpolate user-controlled values into DB::raw(). Use parameter
      bindings where possible. If DB::raw() is unavoidable for this expression,
      wrap the interpolated LIKE value with $pdo->quote(), for example
      DB::raw("lower(" . $pdo->quote("%{$word}%") . ")"). Ensure the PDO object
      is obtained from DB::connection()->getPdo() and passed into all closures
      that build the affected query.

    params:

      cve_id: CVE-2025-67889

      vulnerability_type: sqli

      affected_versions: ["<=3.4.0-9", "<=3.5.0-1"]

      patched_versions: ["3.4.0-10", "3.5.0-2"]

      file_path_patterns:

        - "classes/institution/Collector\\.php$"

      class_name: Collector

      function_name: getQueryBuilder

      source_patterns:

        - "searchPhrase"

