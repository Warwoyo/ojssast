  # ===== PATH TRAVERSAL / ARBITRARY FILE WRITE ============================

  - id: CVE-SRC-67890

    name: "Path Traversal in NativeXmlIssueGalleyFilter file_name Handling (CVE-2025-67890)"

    module: source_code

    cwe: CWE-22

    owasp: "A01:2021"

    severity: HIGH

    pattern_type: cve

    cvss_score: 8.8

    cve_references: ["CVE-2025-67890"]

    description: >-

      The Native XML import filter reads the XML file_name element and assigns
      its textContent directly as the server-side file name using
      setServerFileName(). Because the value is not sanitized, an authenticated
      user with access to the Native XML import/export plugin may supply path
      traversal sequences or unsafe path components. The resulting server-side
      file name can later be used by file write logic, leading to arbitrary file
      write or overwrite. In some deployments, this may lead to remote code
      execution if the attacker can target a web-accessible path.

    remediation: >-

      Sanitize XML-provided file names before passing them to
      setServerFileName(). Restrict the value to a strict allowlist of safe
      characters, normalize it to lowercase, replace unsafe separators, and
      remove any remaining characters outside the expected set. A safe patch
      should use preg_replace() with an allowlist such as /[^a-z0-9\.\-]+/,
      combined with str_replace(), strtolower(), and trim(), or an equivalent
      basename plus allowlist validation strategy.

    params:

      cve_id: CVE-2025-67890

      vulnerability_type: path_traversal_arbitrary_file_write

      affected_versions: ["<=3.3.0-21", "<=3.4.0-9", "<=3.5.0-1"]

      patched_versions: ["3.3.0-22", "3.4.0-10", "3.5.0-2"]

      file_path_patterns:

        - "plugins/importexport/native/filter/NativeXmlIssueGalleyFilter\\.php$"

      class_name: NativeXmlIssueGalleyFilter

      function_name: handleElement

      source_patterns:

        - "case\\s+['\"]file_name['\"]\\s*:"

        - "\\$o->textContent"

        - "\\$issueFile->setServerFileName\\s*\\("

      sink_patterns:

        - "case\\s+['\"]file_name['\"]\\s*:\\s*\\$issueFile->setServerFileName\\s*\\(\\s*\\$o->textContent\\s*\\)"

        - "\\$issueFile->setServerFileName\\s*\\(\\s*\\$o->textContent\\s*\\)"

        - "setServerFileName\\s*\\(\\s*\\$o->textContent\\s*\\)"

      safe_patch_patterns:

        - "preg_replace\\s*\\("

        - "\\/\\[\\^a-z0-9\\\\\\.\\\\\\-\\]\\+\\/"

        - "str_replace\\s*\\("

        - "strtolower\\s*\\(\\s*\\$o->textContent\\s*\\)"

        - "trim\\s*\\("

        - "basename\\s*\\("

      confidence_reason: >-

        The handleElement() function in NativeXmlIssueGalleyFilter processes the
        XML file_name element and passes $o->textContent directly into
        setServerFileName(). A vulnerable implementation lacks strict filename
        normalization or allowlist filtering before the value reaches server-side
        file write handling.

  # ===== LESS / CSS PREPROCESSOR CODE INJECTION ===========================

  - id: CVE-SRC-67893

    name: "LESS Code Injection in baseColour DefaultThemePlugin (CVE-2025-67893)"

    module: source_code

    cwe: CWE-94

    owasp: "A03:2021"

    severity: HIGH

    pattern_type: cve

    cvss_score: 0.0

    cve_references: ["CVE-2025-67893"]

    description: >-

      The baseColour theme option is concatenated directly into a LESS variable
      assignment without strict validation. An authenticated user with access to
      the Theme Settings API may store a malicious baseColour value, which is
      later inserted into $additionalLessVariables as @bg-base and parsed by the
      LESS compiler. This can lead to LESS code injection, potentially enabling
      SSRF or local file read depending on LESS parser behavior and runtime
      configuration.

    remediation: >-

      Validate baseColour using a strict hexadecimal colour allowlist before
      storing or using it. Reject or reset invalid values in saveOption(), and
      revalidate the value in init() before concatenating it into LESS variables.
      Use a pattern such as /^#[0-9a-fA-F]{1,6}$/ and fall back to a safe default
      such as #1E6292 when validation fails.

    params:

      cve_id: CVE-2025-67893

      vulnerability_type: less_code_injection

      affected_versions: ["<=3.3.0-21", "<=3.4.0-9", "<=3.5.0-1"]

      patched_versions: ["3.3.0-22", "3.4.0-10", "3.5.0-2"]

      file_path_patterns:

        - "plugins/themes/default/DefaultThemePlugin\\.inc\\.php$"

        - "plugins/themes/default/DefaultThemePlugin\\.php$"

      class_name: DefaultThemePlugin

      function_name: init

      source_patterns:

        - "baseColour"

        - "\\$this->getOption\\(\\s*['\"]baseColour['\"]\\s*\\)"

        - "\\$additionalLessVariables"

        - "@bg-base"

      sink_patterns:

        - "\\$additionalLessVariables\\s*\\[\\s*\\]\\s*=\\s*['\"]@bg-base\\s*:\\s*['\"]\\s*\\.\\s*\\$this->getOption\\(\\s*['\"]baseColour['\"]\\s*\\)"

        - "\\$additionalLessVariables\\s*\\[\\s*\\]\\s*=\\s*['\"]@bg-base\\s*:\\s*['\"]\\s*\\."

        - "@bg-base\\s*:"

        - "\\.\\s*\\$this->getOption\\(\\s*['\"]baseColour['\"]\\s*\\)"

      safe_patch_patterns:

        - "preg_match\\s*\\(\\s*['\"][/]\\^#\\[0-9a-fA-F\\]\\{1,6\\}\\$[/]['\"]\\s*,\\s*\\$baseColour\\s*\\)"

        - "preg_match\\s*\\(\\s*['\"][/]\\^#\\[0-9a-fA-F\\]\\{1,6\\}\\$[/]['\"]\\s*,\\s*\\$value\\s*\\)"

        - "\\$baseColour\\s*=\\s*['\"]#1E6292['\"]"

        - "public\\s+function\\s+saveOption\\s*\\(\\s*\\$name\\s*,\\s*\\$value"

      confidence_reason: >-

        The DefaultThemePlugin init() function reads the baseColour option using
        $this->getOption('baseColour') and concatenates it into the LESS variable
        array as @bg-base without strict hexadecimal colour validation. The
        patched implementation validates baseColour with /^#[0-9a-fA-F]{1,6}$/
        and adds saveOption() validation before persisting the option.


  # ===== GENERIC LESS VARIABLE INJECTION ==================================

  - id: SAST-SRC-LESS-001

    name: "Potential LESS Variable Injection from Unsanitized Theme Option"

    module: source_code

    cwe: CWE-94

    owasp: "A03:2021"

    severity: MEDIUM

    pattern_type: regex

    cvss_score: 6.5

    cve_references: []

    description: >-

      A user-controlled or stored theme option appears to be concatenated into a
      LESS variable assignment. If the value is not strictly allowlisted before
      being passed to a LESS parser, an attacker may inject additional LESS
      syntax. This may lead to server-side request forgery, local file read, or
      other parser-dependent impact.

    remediation: >-

      Do not concatenate untrusted input directly into LESS, SASS, or CSS
      preprocessor variables. Use strict allowlist validation based on the
      expected value type. For colour values, require a hexadecimal colour format
      such as /^#[0-9a-fA-F]{1,6}$/. Reject invalid values or replace them with
      a safe default before compiling stylesheets.

    params:

      vulnerability_type: less_variable_injection

      affected_versions: []

      patched_versions: []

      file_path_patterns:

        - ".*\\.php$"

        - ".*\\.inc\\.php$"

      class_name: "*"

      function_name: "*"

      source_patterns:

        - "getOption\\s*\\("

        - "(baseColour|baseColor|colour|color|background|theme|stylesheet)"

        - "\\$additionalLessVariables"

      sink_patterns:

        - "\\$additionalLessVariables\\s*\\[\\s*\\]\\s*=\\s*['\"]@[A-Za-z0-9_-]+\\s*:\\s*['\"]\\s*\\."

        - "\\$additionalLessVariables\\s*\\[\\s*\\]\\s*=.*\\.\\s*\\$this->getOption\\s*\\("

        - "@[A-Za-z0-9_-]+\\s*:.*\\$this->getOption\\s*\\("

        - "Less_Parser"

        - "compileLess\\s*\\("

      safe_patch_patterns:

        - "preg_match\\s*\\(\\s*['\"][/]\\^#\\[0-9a-fA-F\\]\\{1,6\\}\\$[/]['\"]"

        - "preg_match\\s*\\(\\s*['\"][/]\\^#\\[0-9a-fA-F\\]\\{3,6\\}\\$[/]['\"]"

        - "preg_match\\s*\\(\\s*['\"][/]\\^#\\[0-9a-fA-F\\]\\{6\\}\\$[/]['\"]"

        - "in_array\\s*\\("

        - "array_key_exists\\s*\\("

      confidence_reason: >-

        The rule detects PHP code that appends dynamic values into LESS variable
        declarations, especially values loaded through getOption(). This pattern
        is risky when the value is not constrained by a strict allowlist before
        being parsed by a LESS compiler.

  # ===== CROSS-SITE REQUEST FORGERY =======================================

  - id: CVE-SRC-67892

    name: "Login CSRF in Validation::login (CVE-2025-67892)"

    module: source_code

    cwe: CWE-352

    owasp: "A01:2021"

    severity: MEDIUM

    pattern_type: cve

    cvss_score: 6.5

    cve_references: ["CVE-2025-67892"]

    description: >-

      The login handler processes authentication requests without validating
      the submitted CSRF token on the server side. Although the login form may
      send a csrfToken parameter, the server-side Validation::login() method
      does not call $request->checkCSRF() before validating credentials and
      establishing an authenticated session. This allows login CSRF, where an
      attacker may force a victim browser to authenticate into an attacker-
      controlled account.

    remediation: >-

      Validate the CSRF token server-side before processing login credentials.
      In Validation::login(), obtain the request object using
      Application::get()->getRequest() and call $request->checkCSRF(). Return
      false immediately if the CSRF check fails. Ensure equivalent CSRF
      protection is enforced for all state-changing authentication endpoints.

    params:

      cve_id: CVE-2025-67892

      vulnerability_type: csrf

      affected_versions: ["<=3.3.0-21", "<=3.4.0-9", "<=3.5.0-1"]

      patched_versions: ["3.3.0-22", "3.4.0-10", "3.5.0-2"]

      file_path_patterns:

        - "classes/security/Validation\\.inc\\.php$"

        - "classes/security/Validation\\.php$"

      class_name: Validation

      function_name: login

      source_patterns:

        - "public\\s+static\\s+function\\s+login\\s*\\("

        - "\\$username"

        - "\\$password"

        - "\\$remember"

      sink_patterns:

        - "verifyPassword\\s*\\("

        - "authenticate\\s*\\("

        - "setUserVar\\s*\\("

        - "SessionManager"

        - "login\\s*\\(\\s*\\$username\\s*,\\s*\\$password"

      safe_patch_patterns:

        - "Application::get\\(\\)->getRequest\\(\\)"

        - "\\$request->checkCSRF\\s*\\("

        - "if\\s*\\(\\s*!\\s*\\$request->checkCSRF\\s*\\(\\s*\\)\\s*\\)"

        - "return\\s+false\\s*;\\s*//\\s*Failed\\s+CSRF\\s+check"

      confidence_reason: >-

        The Validation::login() function processes username and password based
        authentication without a server-side CSRF validation guard. A vulnerable
        implementation lacks Application::get()->getRequest() and
        $request->checkCSRF() before password verification or session-related
        authentication logic.