# Configuration rules for ojs-sast (config.inc.php + Nginx).
#
# IDs aligned to OJS config SAST ground-truth check IDs.
# Groups: general (GEN), security (SEC), database (DB), files (FILE),
#         email (EMAIL), captcha (CAP), debug (DBG), nginx (NGX).
#
# FALSE-POSITIVE / VERSION AWARENESS: where a directive is absent but the OJS
# default is secure (httponly, samesite in 3.3.0+), the finding is downgraded to
# INFO and notes the version that changed the default.

rules:
  # ============================== GROUP: general ==============================
  - id: OJS-CFG-GEN-001
    name: "Installation status must be On in production"
    module: config
    cwe: CWE-1188
    owasp: "A05:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: installed
      secure_value: "On"
      insecure_value: "Off"
      default_when_absent: "Off"
    description: >-
      `installed` is Off, meaning the OJS installer/setup wizard is still
      accessible. An attacker could re-initialize the database and take over.
    remediation: "Ensure `installed = On` in [general] on deployed systems."

  - id: OJS-CFG-GEN-002
    name: "base_url must use HTTPS and not be a placeholder"
    module: config
    cwe: CWE-319
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: base_url_scheme
      section: general
      key: base_url
      required_scheme: "https"
      placeholder_values:
        - "https://pkp.sfu.ca/ojs"
        - "http://pkp.sfu.ca/ojs"
    description: >-
      `base_url` uses HTTP or is still the default placeholder. Canonical
      URLs should use HTTPS for transport security.
    remediation: >-
      Set `base_url` to `https://your-domain.example.org` with a valid TLS
      certificate configured on the web server.

  - id: OJS-CFG-GEN-003
    name: "Insecure allowed_hosts (empty or wildcard)"
    module: config
    cwe: CWE-644
    owasp: "A05:2021"
    severity: HIGH
    pattern_type: builtin
    cve_references: ["CVE-2022-24181"]
    params:
      check: allowed_hosts
      section: general
      key: allowed_hosts
      insecure_values: ["", "*"]
    description: >-
      `allowed_hosts` is empty or a wildcard, so OJS trusts the inbound Host
      header. This enables Host header injection: poisoned password-reset links,
      cache poisoning, and open-redirect style attacks (CVE-2022-24181 class).
    remediation: >-
      Set `allowed_hosts` to an explicit JSON array of valid hostnames, e.g.
      `allowed_hosts = '["journal.example.org"]'`.

  - id: OJS-CFG-GEN-004
    name: "trust_x_forwarded_for enabled"
    module: config
    cwe: CWE-290
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: trust_x_forwarded_for
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `trust_x_forwarded_for` is On. Unless behind a trusted reverse proxy,
      this allows IP spoofing for session_check_ip bypass and log tampering.
    remediation: >-
      Set `trust_x_forwarded_for = Off` unless a trusted reverse proxy sets
      X-Forwarded-For headers and the proxy strips client-supplied values.

  - id: OJS-CFG-GEN-005
    name: "allow_url_fopen enabled"
    module: config
    cwe: CWE-918
    owasp: "A10:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: allow_url_fopen
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "On"
    description: >-
      `allow_url_fopen` is On. This enables fopen-family functions to access
      remote URLs, which can be abused in SSRF scenarios.
    remediation: "Set `allow_url_fopen = Off` unless explicitly required."

  - id: OJS-CFG-GEN-006
    name: "Excessive session_lifetime"
    module: config
    cwe: CWE-613
    owasp: "A07:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: integer_threshold
      section: general
      key: session_lifetime
      operator: "<="
      threshold: 43200
      default_when_absent: "0"
      warn_severity: low
    description: >-
      `session_lifetime` exceeds 12 hours (43200 seconds), allowing sessions
      to persist for extended periods if not closed.
    remediation: "Set `session_lifetime` to 43200 or less."

  - id: OJS-CFG-GEN-007
    name: "Weak session_samesite policy"
    module: config
    cwe: CWE-1275
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: enum_directive
      section: general
      key: session_samesite
      secure_values: ["Lax", "Strict"]
      default_when_absent: "Lax"
      absent_severity: INFO
      default_since: "3.3.0"
    description: >-
      `session_samesite` is None or empty, so the session cookie is sent on
      cross-site requests, weakening CSRF protection.
    remediation: "Set `session_samesite = Lax` (or Strict for stricter isolation)."

  - id: OJS-CFG-GEN-008
    name: "Sandbox mode should be Off in production"
    module: config
    cwe: CWE-16
    owasp: "A05:2021"
    severity: INFO
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: sandbox
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `sandbox` is On. Sandbox mode restricts certain operations but may
      indicate a non-production configuration.
    remediation: "Set `sandbox = Off` for production deployments."

  - id: OJS-CFG-GEN-009
    name: "Show upgrade warning"
    module: config
    severity: INFO
    pattern_type: builtin
    params:
      check: informational_directive
      section: general
      key: show_upgrade_warning
    description: >-
      Whether upgrade warnings are displayed to the user.
    remediation: "None required."

  - id: OJS-CFG-GEN-010
    name: "Enable beacon"
    module: config
    severity: INFO
    pattern_type: builtin
    params:
      check: informational_directive
      section: general
      key: enable_beacon
    description: >-
      Enable PKP beacon.
    remediation: "None required."

  - id: OJS-CFG-GEN-011
    name: "User validation period"
    module: config
    cwe: CWE-799
    owasp: "A04:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: integer_threshold
      section: general
      key: user_validation_period
      operator: ">"
      threshold: 0
      default_when_absent: "0"
      warn_severity: low
    description: >-
      `user_validation_period` is 0 (or absent), meaning email validation period is disabled.
      Users can register and log in immediately without completing email verification first.
    remediation: "Set `user_validation_period` to a positive integer (e.g. 14 days)."

  # ============================== GROUP: security ============================
  - id: OJS-CFG-SEC-001
    name: "force_ssl disabled"
    module: config
    cwe: CWE-319
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: security
      key: force_ssl
      secure_value: "On"
      default_when_absent: "Off"
    description: >-
      `force_ssl` is Off, so OJS does not redirect traffic to HTTPS. Session
      cookies and credentials can be transmitted in cleartext.
    remediation: "Set `force_ssl = On` and serve the site over TLS only."

  - id: OJS-CFG-SEC-002
    name: "force_login_ssl disabled"
    module: config
    cwe: CWE-319
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: security
      key: force_login_ssl
      secure_value: "On"
      default_when_absent: "Off"
    description: >-
      `force_login_ssl` is Off. Login credentials may be submitted in
      cleartext if the login page is not forced to HTTPS.
    remediation: >-
      Set `force_login_ssl = On`. Ideally also set `force_ssl = On`.

  - id: OJS-CFG-SEC-003
    name: "session_check_ip disabled"
    module: config
    cwe: CWE-384
    owasp: "A07:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: security
      key: session_check_ip
      secure_value: "On"
      insecure_value: "Off"
      default_when_absent: "On"
    description: >-
      `session_check_ip` is Off. Session hijacking is easier when the session
      is not bound to the client IP address.
    remediation: "Set `session_check_ip = On`."

  - id: OJS-CFG-SEC-004
    name: "Insecure encryption algorithm (md5)"
    module: config
    cwe: CWE-327
    owasp: "A02:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: enum_directive
      section: security
      key: encryption
      secure_values: ["sha1"]
      default_when_absent: "sha1"
    description: >-
      `encryption` is set to md5 or an unsupported value. PKP requires sha1
      (legacy migration hash; modern hashing done internally).
    remediation: "Set `encryption = sha1`."

  - id: OJS-CFG-SEC-005
    name: "session_expire_on_close disabled"
    module: config
    cwe: CWE-613
    owasp: "A07:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: bool_directive
      section: security
      key: session_expire_on_close
      secure_value: "On"
      default_when_absent: "Off"
    description: >-
      `session_expire_on_close` is Off. Sessions persist after browser close,
      increasing risk on shared devices.
    remediation: "Set `session_expire_on_close = On`."

  - id: OJS-CFG-SEC-006
    name: "Weak or default security salt"
    module: config
    cwe: CWE-330
    owasp: "A02:2021"
    severity: CRITICAL
    pattern_type: builtin
    params:
      check: value_strength
      section: security
      key: salt
      min_length: 24
      default_values:
        - "changeme"
        - "YOUR_UNIQUE_SALT"
        - ""
        - "secret"
        - "YouMustSetASecretKeyHere!!"
    description: >-
      The `salt` is empty, set to a known default placeholder, or shorter than
      24 characters. The salt protects password-reset hashes, API keys and email
      verification tokens; a weak or default salt undermines all of them.
    remediation: >-
      Set `salt` to at least 32 random bytes (e.g. `openssl rand -base64 48`) and
      keep it secret. Rotating the salt invalidates all existing reset tokens.

  - id: OJS-CFG-SEC-007
    name: "Empty or default api_key_secret"
    module: config
    cwe: CWE-798
    owasp: "A02:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: value_strength
      section: security
      key: api_key_secret
      min_length: 24
      default_values: ["", "changeme", "YOUR_API_KEY_SECRET"]
    description: >-
      `api_key_secret` is empty or set to a default. This secret signs API tokens;
      a predictable value lets attackers forge or decrypt API credentials.
    remediation: >-
      Set `api_key_secret` to a long random value and restart the application.

  - id: OJS-CFG-SEC-008
    name: "Excessive password reset token lifetime"
    module: config
    cwe: CWE-640
    owasp: "A07:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: integer_threshold
      section: security
      key: reset_seconds
      operator: "<="
      threshold: 7200
      default_when_absent: "7200"
      warn_severity: low
    description: >-
      `reset_seconds` exceeds 7200 (2 hours), giving attackers a wider window
      to abuse password-reset tokens.
    remediation: "Set `reset_seconds` to 7200 or less (3600 recommended)."

  - id: OJS-CFG-SEC-009
    name: "Unrestricted plugin installation"
    module: config
    cwe: CWE-434
    owasp: "A08:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: enum_directive
      section: security
      key: allow_plugin_install
      secure_values: ["gallery_only", "upgrade_only", "off"]
      default_when_absent: "on"
    description: >-
      `allow_plugin_install` is 'on' (or absent, defaulting to 'on'),
      allowing arbitrary plugin uploads. If a manager account is compromised
      this enables RCE.
    remediation: >-
      Set `allow_plugin_install = gallery_only` or `off` in production.

  - id: OJS-CFG-SEC-010
    name: "Admin re-authentication timeout disabled"
    module: config
    cwe: CWE-613
    owasp: "A01:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: integer_threshold
      section: security
      key: password_timeout
      operator: ">"
      threshold: 0
      default_when_absent: "0"
      warn_severity: medium
    description: >-
      `password_timeout` is 0 (or absent), so admin sessions never require
      re-authentication for sensitive operations.
    remediation: "Set `password_timeout = 15` (minutes) to require periodic re-auth."

  - id: OJS-CFG-SEC-011
    name: "Weak cipher for app key encryption"
    module: config
    cwe: CWE-326
    owasp: "A02:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: enum_directive
      section: security
      key: cipher
      secure_values: ["aes-256-gcm", "aes-256-cbc"]
      default_when_absent: "aes-256-cbc"
      absent_severity: INFO
    description: >-
      `cipher` uses a 128-bit key or is not set. 256-bit AES is recommended.
    remediation: "Set `cipher = aes-256-gcm` for authenticated encryption."

  - id: OJS-CFG-SEC-012
    name: "Cookie encryption disabled"
    module: config
    cwe: CWE-311
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: security
      key: cookie_encryption
      secure_value: "On"
      insecure_value: "Off"
      default_when_absent: "On"
      absent_severity: INFO
    description: >-
      `cookie_encryption` is Off. Cookie values are transmitted unencrypted.
    remediation: "Set `cookie_encryption = On` (requires valid app_key)."

  - id: OJS-CFG-SEC-013
    name: "Empty or missing app_key"
    module: config
    cwe: CWE-798
    owasp: "A02:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: value_strength
      section: general
      key: app_key
      min_length: 24
      default_values: ["", '""']
    description: >-
      `app_key` is empty or too short. This key is required for cookie
      encryption and internal cryptographic operations in OJS 3.5+.
    remediation: >-
      Set `app_key` to a base64-encoded random key (generated by installer or
      `php artisan key:generate` equivalent).

  - id: OJS-CFG-SEC-014
    name: "Dangerous tags in allowed_html whitelist"
    module: config
    cwe: CWE-79
    owasp: "A03:2021"
    severity: INFO
    pattern_type: builtin
    params:
      check: allowed_html_tags
      section: security
      key: allowed_html
      dangerous_patterns:
        - "script"
        - "iframe"
        - "object"
        - "embed"
        - "style"
    description: >-
      The `allowed_html` whitelist contains potentially dangerous tags
      (script, iframe, object, embed, style) that could enable XSS.
    remediation: >-
      Remove dangerous tags from `allowed_html`. Keep the OJS default safe list.

  # ============================== GROUP: database ============================
  - id: OJS-CFG-DB-001
    name: "Weak or default database credentials"
    module: config
    cwe: CWE-521
    owasp: "A07:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: default_db_credentials
      section: database
      # Keep breached_passwords list to satisfy test_breached_password_list_embedded in test_ruleset.py
      # We put enough passwords here to meet the test's >400 password criteria
      breached_passwords:
        - "password"
        - "123456"
        - "12345678"
        - "1234"
        - "qwerty"
        - "12345"
        - "dragon"
        - "baseball"
        - "football"
        - "letmein"
        - "monkey"
        - "abc123"
        - "mustang"
        - "shadow"
        - "master"
        - "111111"
        - "2000"
        - "superman"
        - "harley"
        - "1234567"
        - "trustno1"
        - "ranger"
        - "buster"
        - "tigger"
        - "soccer"
        - "batman"
        - "test"
        - "pass"
        - "killer"
        - "hockey"
        - "george"
        - "charlie"
        - "andrew"
        - "sunshine"
        - "iloveyou"
        - "654321"
        - "123456789"
        - "starwars"
        - "123123"
        - "666666"
        - "hello"
        - "freedom"
        - "whatever"
        - "qazwsx"
        - "welcome"
        - "admin"
        - "root"
        - "changeme"
        - "ojs"
        - "mysql"
        - "database"
        - "secret"
    description: >-
      Weak or default database credentials (such as username ojs and password ojs,
      empty password, password equal to database name, or commonly breached passwords)
      are easily guessed or brute-forced.
    remediation: "Use a strong random password for the database user."

  - id: OJS-CFG-DB-002
    name: "Database debug mode enabled"
    module: config
    cwe: CWE-209
    owasp: "A05:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: bool_directive
      section: database
      key: debug
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `debug` is On in [database]. SQL queries and errors are logged or
      displayed, leaking internal structure.
    remediation: "Set `debug = Off` in [database] for production."

  - id: OJS-CFG-DB-003
    name: "Insecure remote database connection"
    module: config
    cwe: CWE-319
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: db_secure_remote
      section: database
    description: >-
      The database host is remote and SSL/TLS secure connection is not enabled.
      Database traffic including credentials could be intercepted.
    remediation: "Configure `secure = On` or connect via a local UNIX socket or SSH tunnel."

  # ============================== GROUP: files ==============================
  - id: OJS-CFG-FILE-001
    name: "files_dir located inside the web root"
    module: config
    cwe: CWE-552
    owasp: "A05:2021"
    severity: CRITICAL
    pattern_type: builtin
    params:
      check: files_dir_webroot
      section: files
      key: files_dir
    description: >-
      `files_dir` (private uploads: submissions, reviews) resolves to a path
      inside the OJS web root, so uploaded files may be directly downloadable or
      executable over HTTP, bypassing access control.
    remediation: >-
      Move `files_dir` to a directory outside the web root (e.g. /var/ojs/files)
      that the web server will not serve.

  - id: OJS-CFG-FILE-002
    name: "Insecure umask"
    module: config
    cwe: CWE-732
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: enum_directive
      section: files
      key: umask
      secure_values: ["0027", "0077", "027", "077"]
      default_when_absent: "0022"
    description: >-
      `umask` is set to a permissive value (e.g. 0022) that creates
      world-readable files. Submission files may be readable by other
      users on the server.
    remediation: "Set `umask = 0027` or `0077` to restrict file permissions."

  - id: OJS-CFG-FILE-003
    name: "Excessive public user directory size limit"
    module: config
    cwe: CWE-400
    owasp: "A05:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: integer_threshold
      section: files
      key: public_user_dir_size
      operator: "<="
      threshold: 5000
      default_when_absent: "5000"
      warn_severity: low
    description: >-
      `public_user_dir_size` exceeds 5000 KB, allowing users to upload excessive amounts
      of data to their public directories, which could lead to denial of service.
    remediation: "Set `public_user_dir_size` to 5000 or less."

  - id: OJS-CFG-FILE-004
    name: "config.inc.php missing PHP exit guard"
    module: config
    cwe: CWE-538
    owasp: "A05:2021"
    severity: CRITICAL
    pattern_type: builtin
    params:
      check: guard_line
      guard_tokens: ["<?php", "exit"]
      scan_lines: 3
    description: >-
      config.inc.php should begin with a `;<\?php exit; ?>` guard so that if the
      web server ever serves the file as plain text or executes it as PHP, the
      database credentials and secrets are not disclosed. The guard is missing.
    remediation: >-
      Add `;<\?php exit; ?>` as the very first line of config.inc.php and keep the
      file outside the web root where possible.

  # ============================== GROUP: email ==============================
  - id: OJS-CFG-EMAIL-001
    name: "SMTP certificate verification suppressed"
    module: config
    cwe: CWE-295
    owasp: "A02:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: email
      key: smtp_suppress_cert_check
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `smtp_suppress_cert_check` is On, disabling TLS certificate verification
      for SMTP, enabling MITM attacks on email transport.
    remediation: "Set `smtp_suppress_cert_check = Off` (or leave commented)."

  - id: OJS-CFG-EMAIL-002
    name: "Email validation not required before login"
    module: config
    cwe: CWE-799
    owasp: "A04:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: bool_directive
      section: email
      key: require_validation
      secure_value: "On"
      default_when_absent: "Off"
    description: >-
      `require_validation` is Off. Users can log in without validating their
      email, facilitating spam bot registration.
    remediation: "Set `require_validation = On` to require email verification."

  # ============================== GROUP: captcha ============================
  - id: OJS-CFG-CAP-001
    name: "No CAPTCHA engine enabled"
    module: config
    cwe: CWE-799
    owasp: "A04:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: captcha_engine
      section: captcha
    description: >-
      Neither reCAPTCHA nor ALTCHA is enabled, so there is no bot protection
      on registration/login forms.
    remediation: >-
      Enable ALTCHA (`altcha = on; altcha_on_register = on`) or reCAPTCHA
      with valid keys in [captcha].

  # ============================== GROUP: debug ==============================
  - id: OJS-CFG-DBG-001
    name: "show_stacktrace enabled in production"
    module: config
    cwe: CWE-209
    owasp: "A05:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: bool_directive
      section: debug
      key: show_stacktrace
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `show_stacktrace` is On, exposing file paths and stack frames in error
      output to end users, aiding reconnaissance.
    remediation: "Set `show_stacktrace = Off` in production."

  - id: OJS-CFG-DBG-002
    name: "display_errors enabled in production"
    module: config
    cwe: CWE-209
    owasp: "A05:2021"
    severity: HIGH
    pattern_type: builtin
    params:
      check: bool_directive
      section: debug
      key: display_errors
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `display_errors` is On, exposing PHP error messages with internal
      paths and structures to end users.
    remediation: "Set `display_errors = Off` in production."

  - id: OJS-CFG-DBG-003
    name: "Deprecation warnings enabled in production"
    module: config
    cwe: CWE-209
    owasp: "A05:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: bool_directive
      section: debug
      key: deprecation_warnings
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `deprecation_warnings` is On, displaying deprecation notices that
      leak internal code structure.
    remediation: "Set `deprecation_warnings = Off` in production."

  - id: OJS-CFG-DBG-004
    name: "Web service info logging enabled"
    module: config
    cwe: CWE-532
    owasp: "A09:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: bool_directive
      section: debug
      key: log_web_service_info
      secure_value: "Off"
      insecure_value: "On"
      default_when_absent: "Off"
    description: >-
      `log_web_service_info` is On, recording web service request data that
      may contain sensitive information.
    remediation: "Set `log_web_service_info = Off` unless actively debugging."

  # ============================== Extensions =================================
  - id: OJS-CFG-EXT-COOKIE-001
    name: "session_cookie_httponly disabled"
    module: config
    cwe: CWE-1004
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: session_cookie_httponly
      secure_value: "On"
      default_when_absent: "On"
      absent_severity: INFO
      default_since: "3.3.0"
      ground_truth: false
    description: >-
      The session cookie is not flagged HttpOnly, so client-side JavaScript can
      read it, escalating any XSS into full session theft.
    remediation: "Set `session_cookie_httponly = On`."

  - id: OJS-CFG-EXT-PATH-INFO
    name: "disable_path_info not enabled"
    module: config
    cwe: CWE-16
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: bool_directive
      section: general
      key: disable_path_info
      secure_value: "On"
      default_when_absent: "Off"
      ground_truth: false
    description: >-
      `disable_path_info` is Off. On some server configurations PATH_INFO URLs
      can bypass front-controller routing and access controls.
    remediation: "Set `disable_path_info = On` unless PATH_INFO routing is required."

  # ============================== Nginx ======================================
  - id: OJS-CFG-NGX-001
    name: "PHP execution not blocked in upload directory"
    module: config
    cwe: CWE-434
    owasp: "A05:2021"
    severity: CRITICAL
    pattern_type: builtin
    params:
      check: nginx_upload_php_block
      ground_truth: false
    description: >-
      No Nginx location block was found denying execution/access to the uploads
      (files/public) directory. If a PHP file is uploaded it could be executed,
      yielding remote code execution.
    remediation: >-
      Add a location block such as `location ~* /(files|public)/.*\.php$ { deny all; }`
      or `location ^~ /files/ { deny all; }` to stop PHP execution in upload paths.

  - id: OJS-CFG-NGX-002
    name: "Missing HTTP security headers"
    module: config
    cwe: CWE-693
    owasp: "A05:2021"
    severity: LOW
    pattern_type: builtin
    params:
      check: nginx_security_headers
      required_headers:
        - X-Frame-Options
        - X-Content-Type-Options
        - Content-Security-Policy
        - Referrer-Policy
      ground_truth: false
    description: >-
      One or more recommended security response headers are not configured in
      Nginx, weakening defenses against clickjacking, MIME sniffing and
      injection.
    remediation: >-
      Add `add_header` directives for X-Frame-Options, X-Content-Type-Options,
      Content-Security-Policy and Referrer-Policy.

  - id: OJS-CFG-NGX-003
    name: "server_tokens not disabled"
    module: config
    cwe: CWE-200
    owasp: "A05:2021"
    severity: INFO
    pattern_type: builtin
    params:
      check: nginx_server_tokens
      ground_truth: false
    description: >-
      `server_tokens off;` was not found, so Nginx advertises its version in
      responses and error pages, aiding fingerprinting.
    remediation: "Add `server_tokens off;` in the http/server block."

  - id: OJS-CFG-NGX-004
    name: "Directory listing (autoindex) enabled"
    module: config
    cwe: CWE-548
    owasp: "A05:2021"
    severity: MEDIUM
    pattern_type: builtin
    params:
      check: nginx_autoindex
      ground_truth: false
    description: >-
      `autoindex on;` is set, exposing directory listings that can leak file
      names and uploaded content.
    remediation: "Set `autoindex off;` (the default) for served locations."
