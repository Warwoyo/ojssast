# Source code rules for ojs-sast.
#
# pattern_type values:
#   regex   -> matched by the generic regex engine (per file_extensions)
#   smarty  -> handled by the dedicated Smarty template scanner
#   ast     -> handled by a dedicated tree-sitter AST handler
#   taint   -> emitted by the data-flow taint engine (metadata only here)
#   cve     -> handled by the CVE-specific scanner (see cve_rules.yaml)
#
# IMPORTANT: Generic source rules no longer carry CVE references.
# CVE-specific detection is handled exclusively by cve_rules.yaml.
# Generic rules are kept as internal diagnostics with reporting: false
# to suppress them from the final report output.

rules:
  - id: RULE-SRC-001
    name: "Smarty output without escape filter"
    module: source_code
    cwe: CWE-79
    owasp: "A03:2021"
    severity: HIGH
    file_extensions: [".tpl", ".smarty"]
    pattern_type: smarty
    pattern: '\{\$[a-zA-Z_][a-zA-Z0-9_]*(?![^}]*\|escape)[^}]*\}'
    cvss_score: 6.1
    # CVE references REMOVED — CVE-specific detection in cve_rules.yaml.
    cve_references: []
    reporting: false
    description: >-
      A Smarty variable is emitted into the template output without a
      security-aware output filter (|escape or |strip_unsafe_html). In OJS
      templates, unescaped output of request-derived or user-stored values
      leads to stored or reflected cross-site scripting.
      NOTE: This is a generic pattern match. CVE-specific XSS findings are
      reported separately by CVE-specific rules.
    remediation: >-
      Apply an output escaper for the context: {$var|escape} for HTML,
      {$var|escape:"url"} for URL attributes, {$var|escape:"javascript"} for
      inline JS. For rich-text fields where HTML is intentionally allowed use
      {$var|strip_unsafe_html} to strip dangerous tags. Only omit all filters
      when the value is provably safe HTML constructed entirely server-side.
    false_positive_exceptions:
      - pattern: '\|escape'
        description: "Variable already has |escape (any variant) applied."
      - pattern: '\|strip_unsafe_html'
        description: "Dangerous HTML stripped; intentional rich-text output."
      - pattern: '\{\$smarty\.'
        description: "Smarty reserved variable, not user data."

  - id: RULE-SRC-002
    name: "Tainted filename/path in file operation (path traversal)"
    module: source_code
    cwe: CWE-22
    owasp: "A01:2021"
    severity: MEDIUM
    file_extensions: [".php", ".phtml", ".inc", ".php3", ".php4", ".php5"]
    pattern_type: regex
    pattern: '(?:file_put_contents|move_uploaded_file|copy|rename|fopen|unlink)\s*\([^;]*?(?:->(?:textContent|getFilename|getName|getClientFileName|getLocalizedName)\b|\$[a-zA-Z_]\w*File(?:name|Path|Name))'
    cvss_score: 9.0
    # CVE references REMOVED — CVE-specific detection in cve_rules.yaml.
    cve_references: []
    reporting: false
    description: >-
      A filename or path derived from NativeXml node content (DOMElement->textContent)
      or from an object getter is passed to a filesystem write function without
      strict whitelisting. This is a generic pattern match; CVE-specific
      path traversal findings (CVE-2023-47271, CVE-2025-67890) are reported
      separately by CVE-specific rules.
    remediation: >-
      Sanitize filenames with a strict allow-list regex before use, e.g.
      preg_replace('/[^a-z0-9.\-]+/', '', strtolower($name)). Prepend a
      uniqid() prefix and confine writes to a dedicated, non-web-accessible
      upload directory. Never use user- or XML-supplied strings as raw paths.

  - id: RULE-SRC-003
    name: "State-changing handler/form/auth method missing CSRF check"
    module: source_code
    cwe: CWE-352
    owasp: "A01:2021"
    severity: MEDIUM
    file_extensions: [".php", ".inc"]
    pattern_type: ast
    cvss_score: 6.5
    # CVE references REMOVED — CVE-specific detection in cve_rules.yaml.
    cve_references: []
    reporting: false
    description: >-
      An OJS Handler class method, Form subclass constructor, or authentication
      method processes POST/request input without CSRF validation. This is a
      generic heuristic. CVE-specific CSRF findings (CVE-2023-5626, CVE-2025-67892)
      are reported separately by CVE-specific rules.
    remediation: >-
      For Handler methods: add $request->checkCSRF() or an authorization policy.
      For Form classes: add $this->addCheck(new FormValidatorCSRF($this)) to the
      constructor. For Validation::login(): add an early $request->checkCSRF()
      return-false guard before credential verification.

  - id: RULE-SRC-004
    name: "LESS compiler injection from user-controlled option"
    module: source_code
    cwe: CWE-94
    owasp: "A03:2021"
    severity: HIGH
    file_extensions: [".php", ".inc", ".phtml"]
    pattern_type: regex
    pattern: '(?i)(?:less(?:php|c)?|Less_Parser|additionalLessVariables|compileLess)[^;\n]{0,200}(?:\$_(?:GET|POST|REQUEST|COOKIE)\b|getUserVar\s*\(|getOption\s*\()'
    cvss_score: 8.1
    # CVE references REMOVED — CVE-specific detection in cve_rules.yaml.
    cve_references: []
    reporting: false
    description: >-
      User-controlled input (direct request parameter or a stored theme option
      settable via API) is concatenated into a LESS variable array or passed to
      a LESS compiler (Less_Parser / compileLess). This is a generic pattern match;
      CVE-specific detection (CVE-2025-67893) in cve_rules.yaml.
    remediation: >-
      Validate any value before concatenation into LESS. For colour inputs use a
      strict hex regex: preg_match('/^#[0-9a-fA-F]{1,6}$/', $value). For other
      option types enforce a strict allow-list. Override saveOption() in the plugin
      to reject invalid values before they are stored.

  - id: RULE-SRC-005
    name: "SQL injection via DB::raw / Capsule::raw with concatenation or interpolation"
    module: source_code
    cwe: CWE-89
    owasp: "A03:2021"
    severity: CRITICAL
    file_extensions: [".php", ".inc", ".phtml"]
    pattern_type: regex
    pattern: '(?:(?:DB|Capsule)::|-\>)(?:raw|statement|unprepared)\s*\([^;]*?(?:\.\s*\$[A-Za-z_]|\{\$[A-Za-z_][A-Za-z0-9_]*\})'
    cvss_score: 9.8
    # CVE references REMOVED — CVE-specific detection in cve_rules.yaml.
    cve_references: []
    reporting: false
    description: >-
      A raw SQL expression is built by concatenating or interpolating a PHP
      variable, bypassing query parameter binding. This is a generic pattern match;
      CVE-specific SQL injection (CVE-2025-67889) is detected by CVE-specific rules.
    remediation: >-
      Use parameter binding / prepared statements. Pass values via bindings
      (e.g. ?-placeholders or named bindings) instead of concatenating or
      interpolating them into the raw SQL string.

  - id: RULE-SRC-006
    name: "Deserialization of user-controlled data (unserialize)"
    module: source_code
    cwe: CWE-502
    owasp: "A08:2021"
    severity: CRITICAL
    file_extensions: [".php", ".inc", ".phtml", ".php5"]
    pattern_type: regex
    pattern: 'unserialize\s*\([^;)]*(?:\$_(?:GET|POST|REQUEST|COOKIE|FILES)\b|getUserVar\s*\()'
    cvss_score: 9.8
    cve_references: []
    reporting: false
    description: >-
      unserialize() is called on data that traces back to user input. This is a
      generic pattern match; CVE-specific detection (CVE-2019-19909) in cve_rules.yaml.
    remediation: >-
      Do not unserialize untrusted input. Use json_decode() for data interchange,
      or pass allowed_classes=false to unserialize() if PHP serialization is
      unavoidable.

  - id: RULE-SRC-007
    name: "Cross-site scripting via tainted echo/print"
    module: source_code
    cwe: CWE-79
    owasp: "A03:2021"
    severity: HIGH
    pattern_type: taint
    cvss_score: 6.1
    cve_references: []
    reporting: false
    description: >-
      Request-derived (tainted) data reaches an output sink (echo, print,
      printf) without passing through an HTML escaper such as
      PKPString::htmlspecialchars(). This is reflected cross-site scripting.
      Generic diagnostic; CVE-specific XSS reported by CVE-specific rules.
    remediation: >-
      Escape the value before output with PKPString::htmlspecialchars() (or
      htmlspecialchars(..., ENT_QUOTES)). In templates prefer {$var|escape}.

  - id: RULE-SRC-008
    name: "Code / command execution sink reached by tainted data"
    module: source_code
    cwe: CWE-94
    owasp: "A03:2021"
    severity: CRITICAL
    pattern_type: taint
    cvss_score: 9.8
    cve_references: []
    reporting: false
    description: >-
      Request-derived (tainted) data reaches a code- or command-execution sink
      (eval, assert, system, exec, shell_exec, passthru, proc_open, popen),
      enabling arbitrary code or OS command execution.
    remediation: >-
      Never pass untrusted input to these functions. Replace eval() with safe
      logic; for OS commands use escapeshellarg()/escapeshellcmd() with a fixed
      command and an allow-list of arguments, or a native PHP API instead.

  - id: RULE-SRC-009
    name: "Dangerous function call with literal superglobal argument"
    module: source_code
    cwe: CWE-94
    owasp: "A03:2021"
    severity: CRITICAL
    file_extensions: [".php", ".inc", ".phtml", ".php5"]
    pattern_type: regex
    pattern: '\b(?:eval|assert|system|exec|shell_exec|passthru|proc_open|popen)\s*\([^;)]*\$_(?:GET|POST|REQUEST|COOKIE|SERVER)\b'
    cvss_score: 9.8
    cve_references: []
    reporting: false
    description: >-
      A code/command execution function is called with a superglobal directly in
      its argument list (single-statement sink). This is a high-confidence
      complement to the taint engine for one-liners.
    remediation: >-
      Remove the dangerous call or strictly validate and escape arguments. Prefer
      native PHP APIs over shelling out, and never eval() request input.

  - id: RULE-SRC-010
    name: "JavaScript innerHTML/outerHTML assigned a non-literal value"
    module: source_code
    cwe: CWE-79
    owasp: "A03:2021"
    severity: MEDIUM
    file_extensions: [".js", ".jsx"]
    pattern_type: regex
    pattern: '\.(?:innerHTML|outerHTML)\s*=\s*[^"''`;\s][^;\n]*'
    cvss_score: 5.4
    cve_references: []
    description: >-
      An element's innerHTML/outerHTML is assigned a value that is not a plain
      string literal (likely a variable or expression), which can introduce
      DOM-based XSS if the value contains attacker-controlled markup.
    remediation: >-
      Use textContent for text, or sanitize HTML with a vetted sanitizer before
      assigning to innerHTML. Avoid building markup from untrusted strings.
    false_positive_exceptions:
      - pattern: "innerHTML\\s*=\\s*['\"`]\\s*['\"`]"
        description: "Clearing the element with an empty string literal."

  - id: RULE-SRC-011
    name: "JavaScript document.write with non-literal argument"
    module: source_code
    cwe: CWE-79
    owasp: "A03:2021"
    severity: MEDIUM
    file_extensions: [".js", ".jsx"]
    pattern_type: regex
    pattern: 'document\.write(?:ln)?\s*\(\s*[^"''`)\s]'
    cvss_score: 5.4
    cve_references: []
    description: >-
      document.write()/writeln() is called with a non-literal argument, which
      can introduce DOM-based XSS when the argument is attacker-controlled.
    remediation: >-
      Avoid document.write(). Build DOM nodes with safe APIs (createElement,
      textContent) and sanitize any HTML before insertion.

  - id: RULE-SRC-012
    name: "JavaScript eval() usage"
    module: source_code
    cwe: CWE-95
    owasp: "A03:2021"
    severity: HIGH
    file_extensions: [".js", ".jsx"]
    pattern_type: regex
    pattern: '(?<![\w.$])eval\s*\('
    cvss_score: 7.4
    cve_references: []
    description: >-
      eval() executes arbitrary JavaScript and is a common DOM XSS / code
      injection sink when fed dynamic input.
    remediation: >-
      Remove eval(). Use JSON.parse() for data, or refactor to avoid dynamic
      code execution entirely.
